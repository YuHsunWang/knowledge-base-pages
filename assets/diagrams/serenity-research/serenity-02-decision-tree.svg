<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#4338ca">DECISION · 投資決策樹</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">技術題材投資決策樹</text>
<text x="72" y="172" font-size="22" fill="#5b6472">四道關卡:技術為真 → 客戶買單 → 營收反映 → 股價未反映;任一關未過則分流</text>
<rect x="80" y="270" width="372" height="184" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,270 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="106" y="332" font-size="27" font-weight="bold" fill="#4338ca">① 技術是真的嗎?</text><text x="106" y="373" font-size="20" fill="#5b6472">已量產 / 客戶測試中?</text><text x="106" y="406" font-size="20" fill="#5b6472">專利 · 規格 · 測試</text><rect x="502" y="270" width="372" height="184" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M520,270 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="528" y="332" font-size="27" font-weight="bold" fill="#4338ca">② 客戶買單嗎?</text><text x="528" y="373" font-size="20" fill="#5b6472">design win / 量產訂單?</text><text x="528" y="406" font-size="20" fill="#5b6472">大客戶認證 · 生態系</text><rect x="924" y="270" width="372" height="184" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M942,270 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="950" y="332" font-size="27" font-weight="bold" fill="#4338ca">③ 營收會反映嗎?</text><text x="950" y="373" font-size="20" fill="#5b6472">今明年放量 · 高毛利?</text><text x="950" y="406" font-size="20" fill="#5b6472">占比 · 毛利 · 產能</text><rect x="1346" y="270" width="372" height="184" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,270 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="1372" y="332" font-size="27" font-weight="bold" fill="#4338ca">④ 股價已反映?</text><text x="1372" y="373" font-size="20" fill="#5b6472">尚未充分反映?</text><text x="1372" y="406" font-size="20" fill="#5b6472">對照景氣位置</text><line x1="458" y1="362.0" x2="494" y2="362.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="880" y1="362.0" x2="916" y2="362.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1302" y1="362.0" x2="1338" y2="362.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><rect x="1346" y="600" width="372" height="184" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,600 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="1372" y="662" font-size="27" font-weight="bold" fill="#0f766e">✅ 潛在機會</text><text x="1372" y="703" font-size="20" fill="#5b6472">四關全過 · 尚未充分反映</text><text x="1372" y="736" font-size="20" fill="#5b6472">可深入研究 / 分批布局</text><line x1="1532.0" y1="460" x2="1532.0" y2="592" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><rect x="80" y="600" width="1180" height="230" rx="16" fill="#f5f3ff" stroke="#e3dcff" filter="url(#soft)"/><text x="108" y="644" font-size="24" font-weight="bold" fill="#6d28d9">任一關未過 → 分流名單</text><text x="108" y="680" font-size="20" fill="#5b6472">只有實驗室階段 → ❌ 排除</text><text x="108" y="708" font-size="20" fill="#5b6472">只有 sample / 概念 → 👁 觀察名單</text><text x="108" y="736" font-size="20" fill="#5b6472">三年後 / 持續燒錢 → ⏳ 等待時程確認</text><text x="108" y="764" font-size="20" fill="#5b6472">已過熱 / 故事股 → ⏸ 等回調再評估</text></svg>