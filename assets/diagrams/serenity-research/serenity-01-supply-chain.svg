<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#6d28d9">VALUE CHAIN · 供應鏈定位</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">供應鏈定位:從趨勢到終端</text>
<text x="72" y="172" font-size="22" fill="#5b6472">選定產業趨勢後,沿上游→中游→下游→終端拆解,找出最難被取代的環節</text>
<rect x="43" y="340" width="330" height="300" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M61,340 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#8b5cf6"/><text x="69" y="402" font-size="27" font-weight="bold" fill="#6d28d9">選定產業趨勢</text><text x="69" y="443" font-size="20" fill="#5b6472">從結構性趨勢切入</text><text x="69" y="476" font-size="20" fill="#5b6472">AI · EV · 能源…</text><rect x="389" y="340" width="330" height="300" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M407,340 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="415" y="402" font-size="27" font-weight="bold" fill="#0f766e">上游</text><text x="415" y="443" font-size="20" fill="#5b6472">原料 · 材料</text><text x="415" y="476" font-size="20" fill="#5b6472">關鍵零組件</text><rect x="735" y="340" width="330" height="300" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M753,340 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="761" y="402" font-size="27" font-weight="bold" fill="#0369a1">中游</text><text x="761" y="443" font-size="20" fill="#5b6472">設計 · 製造</text><text x="761" y="476" font-size="20" fill="#5b6472">代工 · 設備</text><rect x="1081" y="340" width="330" height="300" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1099,340 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1107" y="402" font-size="27" font-weight="bold" fill="#b45309">下游</text><text x="1107" y="443" font-size="20" fill="#5b6472">封裝 · 組裝</text><text x="1107" y="476" font-size="20" fill="#5b6472">模組 · 整合</text><rect x="1427" y="340" width="330" height="300" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1445,340 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#f43f5e"/><text x="1453" y="402" font-size="27" font-weight="bold" fill="#be123c">終端客戶</text><text x="1453" y="443" font-size="20" fill="#5b6472">雲端大廠 · 車廠</text><text x="1453" y="476" font-size="20" fill="#5b6472">工業</text><line x1="377" y1="490.0" x2="383" y2="490.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="723" y1="490.0" x2="729" y2="490.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1069" y1="490.0" x2="1075" y2="490.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1415" y1="490.0" x2="1421" y2="490.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><circle cx="78" cy="974" r="8" fill="#8b5cf6"/><text x="96" y="980" font-size="21" fill="#5b6472">趨勢</text><circle cx="222" cy="974" r="8" fill="#14b8a6"/><text x="240" y="980" font-size="21" fill="#5b6472">上游</text><circle cx="366" cy="974" r="8" fill="#0ea5e9"/><text x="384" y="980" font-size="21" fill="#5b6472">中游</text><circle cx="510" cy="974" r="8" fill="#f59e0b"/><text x="528" y="980" font-size="21" fill="#5b6472">下游</text><circle cx="654" cy="974" r="8" fill="#f43f5e"/><text x="672" y="980" font-size="21" fill="#5b6472">終端</text></svg>