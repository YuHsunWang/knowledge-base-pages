<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1120" viewBox="0 0 1800 1120" font-family="Microsoft JhengHei, Noto Sans CJK TC, Noto Sans CJK SC, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fbfcfe"/><stop offset="1" stop-color="#f3f5f9"/>
  </linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#27324a" flood-opacity="0.10"/>
  </filter>
  <marker id="aFaint" markerWidth="11" markerHeight="11" refX="7.5" refY="4" orient="auto">
    <path d="M0,0 L9,4 L0,8 Z" fill="#8a93a6"/>
  </marker>
  <marker id="aViolet" markerWidth="12" markerHeight="12" refX="8" refY="4.2" orient="auto">
    <path d="M0,0 L9.5,4.2 L0,8.4 Z" fill="#8b5cf6"/>
  </marker>
</defs>
<rect x="0" y="0" width="1800" height="1120" fill="url(#bg)"/>
<rect x="1" y="1" width="1798" height="1118" rx="22" fill="none" stroke="#e9ecf3"/>

<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#4338ca">MCMC · 迭代閉環</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">貝氏 MCMC 迭代流程</text>
<text x="72" y="172" font-size="22" fill="#5b6472">Metropolis-Hastings 取樣：初始化 → 提議 → 接受/拒絕 → 更新 → 預測 → 儲存,每次迭代回到提議步驟</text>
<rect x="80" y="280" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,280 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="106" y="342" font-size="27" font-weight="bold" fill="#4338ca">初始化參數</text><text x="106" y="383" font-size="20" fill="#5b6472">使用者 a_u · s_u · C_switch</text><text x="106" y="416" font-size="20" fill="#5b6472">族群超參數 θ · Σ · σ</text><rect x="502" y="280" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M520,280 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="528" y="342" font-size="27" font-weight="bold" fill="#0369a1">提出使用者參數</text><text x="528" y="383" font-size="20" fill="#5b6472">log-normal random walk</text><text x="528" y="416" font-size="20" fill="#5b6472">s_u = 1 + z_u (z_u &gt; 0)</text><rect x="924" y="280" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M942,280 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="950" y="342" font-size="27" font-weight="bold" fill="#0369a1">計算接受比值</text><text x="950" y="383" font-size="20" fill="#5b6472">似然比 · 先驗比</text><text x="950" y="416" font-size="20" fill="#5b6472">proposal 修正項</text><rect x="1346" y="280" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,280 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1372" y="342" font-size="27" font-weight="bold" fill="#b45309">MH 接受 / 拒絕</text><text x="1372" y="383" font-size="20" fill="#5b6472">α = min(1, r)</text><text x="1372" y="416" font-size="20" fill="#5b6472">接受則替換,否則保留</text><rect x="1346" y="600" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,600 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1372" y="662" font-size="27" font-weight="bold" fill="#b45309">更新族群超參數</text><text x="1372" y="703" font-size="20" fill="#5b6472">θ_a · Σ_a</text><text x="1372" y="736" font-size="20" fill="#5b6472">θ_switch · σ_switch</text><rect x="713" y="600" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M731,600 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#8b5cf6"/><text x="739" y="662" font-size="27" font-weight="bold" fill="#6d28d9">預測與評估</text><text x="739" y="703" font-size="20" fill="#5b6472">預測下一個類別</text><text x="739" y="736" font-size="20" fill="#5b6472">計算訓練準確率</text><rect x="80" y="600" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,600 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#8b5cf6"/><text x="106" y="662" font-size="27" font-weight="bold" fill="#6d28d9">儲存後驗樣本</text><text x="106" y="703" font-size="20" fill="#5b6472">參數樣本 · 接受率</text><text x="106" y="736" font-size="20" fill="#5b6472">收斂 trace</text><line x1="458" y1="374.0" x2="494" y2="374.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="880" y1="374.0" x2="916" y2="374.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1302" y1="374.0" x2="1338" y2="374.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1532.0" y1="474" x2="1532.0" y2="592" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1340" y1="694.0" x2="1093" y2="694.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="707" y1="694.0" x2="460" y2="694.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><path d="M266.0,594 C266.0,444 688.0,626 688.0,476" fill="none" stroke="#8b5cf6" stroke-width="2.6" stroke-dasharray="9 7" marker-end="url(#aViolet)"/><text x="327.0" y="529.0" font-size="20" font-weight="bold" fill="#6d28d9">每次迭代 · MCMC loop</text><rect x="600" y="902" width="600" height="158" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M618,902 h564 a18,18 0 0 1 18,18 v6 h-600 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="626" y="964" font-size="27" font-weight="bold" fill="#0f766e">收斂診斷與後驗</text><text x="626" y="1005" font-size="20" fill="#5b6472">n_iter 次迭代後輸出 · trace · 接受率 · 參數分布</text><line x1="266.0" y1="794" x2="604" y2="981.0" stroke="#0f766e" stroke-width="2.6" marker-end="url(#aFaint)"/><text x="284.0" y="860" font-size="20" font-weight="bold" fill="#0f766e">n_iter 次後</text><circle cx="78" cy="1066" r="8" fill="#6366f1"/><text x="96" y="1072" font-size="21" fill="#5b6472">初始化</text><circle cx="244" cy="1066" r="8" fill="#0ea5e9"/><text x="262" y="1072" font-size="21" fill="#5b6472">取樣提議</text><circle cx="432" cy="1066" r="8" fill="#f59e0b"/><text x="450" y="1072" font-size="21" fill="#5b6472">MH 決策 / 更新</text><circle cx="752" cy="1066" r="8" fill="#8b5cf6"/><text x="770" y="1072" font-size="21" fill="#5b6472">預測 / 儲存</text><circle cx="1006" cy="1066" r="8" fill="#14b8a6"/><text x="1024" y="1072" font-size="21" fill="#5b6472">輸出</text></svg>