<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#b45309">QUALIFICATION · 認證≠量產</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">車規認證與商業化路徑</text>
<text x="72" y="172" font-size="22" fill="#5b6472">AEC-Q200 是門票,不是終點;要走完 AVL → PPAP → 量產 → 長期可靠度才算商業化</text>
<rect x="80" y="262" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,262 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="106" y="324" font-size="27" font-weight="bold" fill="#4338ca">① 元件開發完成</text><text x="106" y="365" font-size="20" fill="#5b6472">MLCC / 電阻 / 電感</text><text x="106" y="398" font-size="20" fill="#5b6472">送認證前準備</text><rect x="502" y="262" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M520,262 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="528" y="324" font-size="27" font-weight="bold" fill="#4338ca">② AEC-Q200</text><text x="528" y="365" font-size="20" fill="#5b6472">元件層可靠度認證</text><text x="528" y="398" font-size="20" fill="#5b6472">⚠ 是門票,非終點</text><rect x="924" y="262" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M942,262 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="950" y="324" font-size="27" font-weight="bold" fill="#0369a1">③ Tier-1 / OEM AVL</text><text x="950" y="365" font-size="20" fill="#5b6472">客戶合格廠商名單</text><text x="950" y="398" font-size="20" fill="#5b6472">歐系 / 中國 NEV / 模組廠</text><rect x="1346" y="262" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,262 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="1372" y="324" font-size="27" font-weight="bold" fill="#0369a1">④ PPAP 量產前核准</text><text x="1372" y="365" font-size="20" fill="#5b6472">生產件核准程序</text><text x="1372" y="398" font-size="20" fill="#5b6472">品質系統查核</text><rect x="1346" y="648" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,648 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1372" y="710" font-size="27" font-weight="bold" fill="#b45309">⑤ 量產出貨</text><text x="1372" y="751" font-size="20" fill="#5b6472">營收驗證</text><text x="1372" y="784" font-size="20" fill="#5b6472">車用占比 YoY</text><rect x="713" y="648" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M731,648 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="739" y="710" font-size="27" font-weight="bold" fill="#b45309">⑥ 長期可靠度</text><text x="739" y="751" font-size="20" fill="#5b6472">形成替換壁壘</text><text x="739" y="784" font-size="20" fill="#5b6472">PCN 風險控管</text><rect x="80" y="648" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,648 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="106" y="710" font-size="27" font-weight="bold" fill="#0f766e">✅ 可量化貢獻</text><text x="106" y="751" font-size="20" fill="#5b6472">營收 / 毛利可拆分</text><text x="106" y="784" font-size="20" fill="#5b6472">車用認證護城河</text><line x1="458" y1="356.0" x2="494" y2="356.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="880" y1="356.0" x2="916" y2="356.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1302" y1="356.0" x2="1338" y2="356.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1532.0" y1="456" x2="1532.0" y2="640" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1340" y1="742.0" x2="1093" y2="742.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="707" y1="742.0" x2="460" y2="742.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><path d="M899.0,642 C899.0,492 688.0,608 688.0,458" fill="none" stroke="#8b5cf6" stroke-width="2.6" stroke-dasharray="9 7" marker-end="url(#aViolet)"/><text x="643.5" y="544.0" font-size="20" font-weight="bold" fill="#6d28d9">認證未過 / PCN → 改善材料·製程 · 重新認證</text><circle cx="78" cy="974" r="8" fill="#6366f1"/><text x="96" y="980" font-size="21" fill="#5b6472">開發 / 認證</text><circle cx="332" cy="974" r="8" fill="#0ea5e9"/><text x="350" y="980" font-size="21" fill="#5b6472">客戶導入</text><circle cx="520" cy="974" r="8" fill="#f59e0b"/><text x="538" y="980" font-size="21" fill="#5b6472">量產 / 可靠度</text><circle cx="796" cy="974" r="8" fill="#14b8a6"/><text x="814" y="980" font-size="21" fill="#5b6472">可量化貢獻</text></svg>