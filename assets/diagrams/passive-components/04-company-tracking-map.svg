<rect x="60" y="290" width="540" height="232" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M78,290 h504 a18,18 0 0 1 18,18 v6 h-540 v-6 a18,18 0 0 1 18,-18 z" fill="#8b5cf6"/><text x="86" y="352" font-size="27" font-weight="bold" fill="#6d28d9">國巨 2327 · 平台型</text><text x="86" y="393" font-size="20" fill="#5b6472">曝險:MLCC+電阻+鉭容+電感+感測</text><text x="86" y="426" font-size="20" fill="#5b6472">問題:KEMET整合 · 事業部毛利 · AI拆分</text><text x="86" y="459" font-size="20" fill="#5b6472">⚠ 槓桿 · 標準品ASP · AI敘事不透明</text><rect x="630" y="290" width="540" height="232" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M648,290 h504 a18,18 0 0 1 18,18 v6 h-540 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="656" y="352" font-size="27" font-weight="bold" fill="#0369a1">華新科 2492 · 景氣純度計</text><text x="656" y="393" font-size="20" fill="#5b6472">曝險:MLCC+電阻,景氣純度高</text><text x="656" y="426" font-size="20" fill="#5b6472">問題:MLCC ASP止跌? · 車規/AI AVL</text><text x="656" y="459" font-size="20" fill="#5b6472">⚠ 景氣被過度外推 · 業外損益</text><rect x="1200" y="290" width="540" height="232" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1218,290 h504 a18,18 0 0 1 18,18 v6 h-540 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1226" y="352" font-size="27" font-weight="bold" fill="#b45309">禾伸堂 3026 · 製造+代理</text><text x="1226" y="393" font-size="20" fill="#5b6472">曝險:自有 MLCC + 代理日系</text><text x="1226" y="426" font-size="20" fill="#5b6472">問題:製造 vs 代理毛利拆分 · 通路領先</text><text x="1226" y="459" font-size="20" fill="#5b6472">⚠ 代理線變動 · 通路庫存堆積</text><rect x="345" y="556" width="540" height="232" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M363,556 h504 a18,18 0 0 1 18,18 v6 h-540 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="371" y="618" font-size="27" font-weight="bold" fill="#0f766e">大毅 2478 · 電阻專業</text><text x="371" y="659" font-size="20" fill="#5b6472">曝險:厚膜/薄膜 · 電流感測 · 抗硫化</text><text x="371" y="692" font-size="20" fill="#5b6472">問題:高階占比? · 車用/AI power 認證</text><text x="371" y="725" font-size="20" fill="#5b6472">⚠ 標準品商品化 · 敘事停留送樣</text><rect x="915" y="556" width="540" height="232" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M933,556 h504 a18,18 0 0 1 18,18 v6 h-540 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="941" y="618" font-size="27" font-weight="bold" fill="#4338ca">奇力新 · 電感磁性</text><text x="941" y="659" font-size="20" fill="#5b6472">曝險:功率電感 · RF · 磁珠 · CMC</text><text x="941" y="692" font-size="20" fill="#5b6472">問題:AI VRM量產? · 車用認證 · 整合效益</text><text x="941" y="725" font-size="20" fill="#5b6472">⚠ 透明度下降 · 順絡競爭</text><rect x="300" y="852" width="1200" height="118" rx="16" fill="#f5f3ff" stroke="#e3dcff" filter="url(#soft)"/><text x="328" y="896" font-size="24" font-weight="bold" fill="#6d28d9">共同檢查順序(五家一致)</text><text x="328" y="932" font-size="20" fill="#5b6472">品類 → 規格 → 客戶階段 → 營收占比 → 毛利率 → 紅旗</text><text x="328" y="960" font-size="20" fill="#5b6472">用同一把尺比較五家;差異在各自的研究問題與紅旗</text></svg>