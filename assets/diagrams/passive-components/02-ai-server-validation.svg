<rect x="1" y="1" width="1798" height="1048" rx="22" fill="none" stroke="#e9ecf3"/>

<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#6d28d9">VERIFICATION · 六格穿透</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">AI Server 需求驗證流程</text>
<text x="72" y="172" font-size="22" fill="#5b6472">題材不是結論。每個「受益 AI」敘事都要走完品類→規格→供應鏈→財務,才決定能否納入 thesis</text>
<rect x="80" y="262" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,262 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="106" y="324" font-size="27" font-weight="bold" fill="#4338ca">① 題材 / 傳聞</text><text x="106" y="365" font-size="20" fill="#5b6472">AI server 受益敘事</text><text x="106" y="398" font-size="20" fill="#5b6472">需穿透驗證,勿直接外推</text><rect x="502" y="262" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M520,262 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="528" y="324" font-size="27" font-weight="bold" fill="#4338ca">② 品類確認</text><text x="528" y="365" font-size="20" fill="#5b6472">MLCC 去耦 · 功率電感 VRM</text><text x="528" y="398" font-size="20" fill="#5b6472">鉭容/薄膜容 · 電流感測電阻</text><rect x="924" y="262" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M942,262 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="950" y="324" font-size="27" font-weight="bold" fill="#0369a1">③ 規格驗證</text><text x="950" y="365" font-size="20" fill="#5b6472">低 ESL · 高 Isat</text><text x="950" y="398" font-size="20" fill="#5b6472">低 DCR · 低 TCR</text><rect x="1346" y="262" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,262 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1372" y="324" font-size="27" font-weight="bold" fill="#b45309">④ 供應鏈階段</text><text x="1372" y="365" font-size="20" fill="#5b6472">未確認 → 送樣 → 進 AVL</text><text x="1372" y="398" font-size="20" fill="#5b6472">→ 小量量產 → 大量量產</text><rect x="1346" y="648" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,648 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1372" y="710" font-size="27" font-weight="bold" fill="#b45309">⑤ 財務驗證</text><text x="1372" y="751" font-size="20" fill="#5b6472">營收占比 · 毛利率</text><text x="1372" y="784" font-size="20" fill="#5b6472">訂單:急單 / 短約 / 長約</text><rect x="713" y="648" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M731,648 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#8b5cf6"/><text x="739" y="710" font-size="27" font-weight="bold" fill="#6d28d9">⑥ 可投資結論?</text><text x="739" y="751" font-size="20" fill="#5b6472">六格是否完整?</text><text x="739" y="784" font-size="20" fill="#5b6472">是 → 納入 · 否 → 待確認</text><rect x="80" y="648" width="372" height="188" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,648 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="106" y="710" font-size="27" font-weight="bold" fill="#0f766e">✅ 納入 thesis</text><text x="106" y="751" font-size="20" fill="#5b6472">六格完整 = 有依據</text><text x="106" y="784" font-size="20" fill="#5b6472">可量化營收 / 毛利貢獻</text><line x1="458" y1="356.0" x2="494" y2="356.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="880" y1="356.0" x2="916" y2="356.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1302" y1="356.0" x2="1338" y2="356.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1532.0" y1="456" x2="1532.0" y2="640" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1340" y1="742.0" x2="1093" y2="742.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="707" y1="742.0" x2="460" y2="742.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><path d="M899.0,642 C899.0,492 266.0,608 266.0,458" fill="none" stroke="#8b5cf6" stroke-width="2.6" stroke-dasharray="9 7" marker-end="url(#aViolet)"/><text x="432.5" y="544.0" font-size="20" font-weight="bold" fill="#6d28d9">未達標 → 標記待確認 · 不外推 EPS · 回觀察清單</text><circle cx="78" cy="974" r="8" fill="#6366f1"/><text x="96" y="980" font-size="21" fill="#5b6472">題材 / 品類</text><circle cx="332" cy="974" r="8" fill="#0ea5e9"/><text x="350" y="980" font-size="21" fill="#5b6472">規格</text><circle cx="476" cy="974" r="8" fill="#f59e0b"/><text x="494" y="980" font-size="21" fill="#5b6472">供應鏈 / 財務</text><circle cx="752" cy="974" r="8" fill="#8b5cf6"/><text x="770" y="980" font-size="21" fill="#5b6472">判斷</text><circle cx="896" cy="974" r="8" fill="#14b8a6"/><text x="914" y="980" font-size="21" fill="#5b6472">可納入結論</text></svg>