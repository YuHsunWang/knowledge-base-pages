<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260" font-family="Microsoft JhengHei, 微軟正黑體, Noto Sans CJK TC, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fbfcfe"/><stop offset="1" stop-color="#f3f5f9"/>
  </linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#27324a" flood-opacity="0.10"/>
  </filter>
  <marker id="aFaint" markerWidth="11" markerHeight="11" refX="7.5" refY="4" orient="auto">
    <path d="M0,0 L9,4 L0,8 Z" fill="#8a93a6"/>
  </marker>
  <marker id="aViolet" markerWidth="12" markerHeight="12" refX="8" refY="4.2" orient="auto">
    <path d="M0,0 L9.5,4.2 L0,8.4 Z" fill="#8b5cf6"/>
  </marker>
</defs>
<rect x="0" y="0" width="1800" height="1260" fill="url(#bg)"/>
<rect x="1" y="1" width="1798" height="1258" rx="22" fill="none" stroke="#e9ecf3"/>

<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#0f766e">PROMPT ENGINEERING</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">Loop Engineering（Agentic Loop）</text>
<text x="72" y="172" font-size="22" fill="#5b6472">模型在工具呼叫或自我反思中循環執行，直到達成目標或觸發終止條件</text>
<rect x="280" y="260" width="310" height="210" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M298,260 h274 a18,18 0 0 1 18,18 v6 h-310 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="306" y="322" font-size="27" font-weight="bold" fill="#0369a1">① 規劃</text><text x="306" y="363" font-size="20" fill="#5b6472">選定行動策略</text><text x="306" y="396" font-size="20" fill="#5b6472">決定呼叫哪個工具</text><rect x="1190" y="260" width="310" height="210" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1208,260 h274 a18,18 0 0 1 18,18 v6 h-310 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="1216" y="322" font-size="27" font-weight="bold" fill="#4338ca">② 執行</text><text x="1216" y="363" font-size="20" fill="#5b6472">呼叫工具 / API</text><text x="1216" y="396" font-size="20" fill="#5b6472">生成回應或操作</text><rect x="1190" y="560" width="310" height="210" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1208,560 h274 a18,18 0 0 1 18,18 v6 h-310 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1216" y="622" font-size="27" font-weight="bold" fill="#b45309">③ 觀察</text><text x="1216" y="663" font-size="20" fill="#5b6472">讀取工具回傳結果</text><text x="1216" y="696" font-size="20" fill="#5b6472">解析環境狀態</text><rect x="280" y="560" width="310" height="210" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M298,560 h274 a18,18 0 0 1 18,18 v6 h-310 v-6 a18,18 0 0 1 18,-18 z" fill="#8b5cf6"/><text x="306" y="622" font-size="27" font-weight="bold" fill="#6d28d9">④ 評估</text><text x="306" y="663" font-size="20" fill="#5b6472">目標達成？</text><text x="306" y="696" font-size="20" fill="#5b6472">錯誤 → 調整策略</text><line x1="595" y1="365" x2="1183" y2="365" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1345" y1="475" x2="1345" y2="553" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1183" y1="665" x2="595" y2="665" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><path d="M280,665 C130,665 130,365 280,365" fill="none" stroke="#8b5cf6" stroke-width="2.8" stroke-dasharray="10 7" marker-end="url(#aViolet)"/><text x="62" y="501" font-size="21" font-weight="bold" fill="#6d28d9" text-anchor="middle">未達成</text><text x="62" y="529" font-size="21" fill="#6d28d9" text-anchor="middle">重新規劃</text><line x1="435" y1="775" x2="435" y2="833" stroke="#14b8a6" stroke-width="2.8" marker-end="url(#aFaint)"/><rect x="270" y="840" width="330" height="110" rx="18" fill="#14b8a6" opacity="0.18" stroke="#14b8a6" stroke-width="2" filter="url(#soft)"/><text x="435" y="886" font-size="27" font-weight="bold" text-anchor="middle" fill="#0f766e">目標達成</text><text x="435" y="922" font-size="21" text-anchor="middle" fill="#5b6472">輸出最終結果</text><text x="215" y="813" font-size="20" font-weight="bold" fill="#0f766e" text-anchor="middle">達成</text><text x="890" y="501" font-size="22" text-anchor="middle" fill="#8a93a6">每輪循環</text><text x="890" y="533" font-size="22" text-anchor="middle" fill="#8a93a6">更新狀態與策略</text><rect x="60" y="1000" width="820" height="175" rx="16" fill="#f5f3ff" stroke="#e3dcff" filter="url(#soft)"/><text x="88" y="1044" font-size="24" font-weight="bold" fill="#0369a1">適用場景</text><text x="88" y="1080" font-size="20" fill="#5b6472">・程式除錯（反覆執行 → 讀取錯誤 → 修正）</text><text x="88" y="1108" font-size="20" fill="#5b6472">・資料搜尋與彙整（多輪工具呼叫）</text><text x="88" y="1136" font-size="20" fill="#5b6472">・自動化流程（需動態決策的工作）</text><rect x="920" y="1000" width="820" height="175" rx="16" fill="#f5f3ff" stroke="#e3dcff" filter="url(#soft)"/><text x="948" y="1044" font-size="24" font-weight="bold" fill="#6d28d9">終止條件設計（避免無限迴圈）</text><text x="948" y="1080" font-size="20" fill="#5b6472">・最大迭代次數（max_iterations）</text><text x="948" y="1108" font-size="20" fill="#5b6472">・明確完成訊號（is_done flag）</text><text x="948" y="1136" font-size="20" fill="#5b6472">・成本 / Token 上限</text><circle cx="78" cy="1202" r="8" fill="#0ea5e9"/><text x="96" y="1208" font-size="21" fill="#5b6472">規劃</text><circle cx="222" cy="1202" r="8" fill="#6366f1"/><text x="240" y="1208" font-size="21" fill="#5b6472">執行</text><circle cx="366" cy="1202" r="8" fill="#f59e0b"/><text x="384" y="1208" font-size="21" fill="#5b6472">觀察</text><circle cx="510" cy="1202" r="8" fill="#8b5cf6"/><text x="528" y="1208" font-size="21" fill="#5b6472">評估</text><circle cx="654" cy="1202" r="8" fill="#14b8a6"/><text x="672" y="1208" font-size="21" fill="#5b6472">完成</text></svg>