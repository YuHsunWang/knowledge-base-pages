<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1180" viewBox="0 0 1800 1180" font-family="Microsoft JhengHei, 微軟正黑體, Noto Sans CJK TC, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fbfcfe"/><stop offset="1" stop-color="#f3f5f9"/>
  </linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#27324a" flood-opacity="0.10"/>
  </filter>
  <marker id="aFaint" markerWidth="11" markerHeight="11" refX="7.5" refY="4" orient="auto">
    <path d="M0,0 L9,4 L0,8 Z" fill="#8a93a6"/>
  </marker>
  <marker id="aViolet" markerWidth="12" markerHeight="12" refX="8" refY="4.2" orient="auto">
    <path d="M0,0 L9.5,4.2 L0,8.4 Z" fill="#8b5cf6"/>
  </marker>
</defs>
<rect x="0" y="0" width="1800" height="1180" fill="url(#bg)"/>
<rect x="1" y="1" width="1798" height="1178" rx="22" fill="none" stroke="#e9ecf3"/>

<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#6d28d9">PROMPT ENGINEERING</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">Chain of Thought（CoT）</text>
<text x="72" y="172" font-size="22" fill="#5b6472">引導模型顯示中間推理步驟，大幅提升複雜問題的準確率</text>
<rect x="60" y="230" width="760" height="52" rx="14" fill="#f43f5e" opacity="0.15" stroke="#f43f5e" stroke-opacity="0.4"/><text x="440" y="263" font-size="24" font-weight="bold" text-anchor="middle" fill="#be123c">❌ 直接回答（Direct Prompting）</text><rect x="190" y="310" width="500" height="130" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M208,310 h464 a18,18 0 0 1 18,18 v6 h-500 v-6 a18,18 0 0 1 18,-18 z" fill="#f43f5e"/><text x="216" y="372" font-size="27" font-weight="bold" fill="#be123c">問題</text><text x="216" y="413" font-size="20" fill="#5b6472">輸入給模型</text><line x1="440" y1="444" x2="440" y2="510" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><rect x="190" y="520" width="500" height="130" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M208,520 h464 a18,18 0 0 1 18,18 v6 h-500 v-6 a18,18 0 0 1 18,-18 z" fill="#f43f5e"/><text x="216" y="582" font-size="27" font-weight="bold" fill="#be123c">答案</text><text x="216" y="623" font-size="20" fill="#5b6472">直接輸出，無推理過程</text><rect x="80" y="690" width="720" height="190" rx="16" fill="#f5f3ff" stroke="#e3dcff" filter="url(#soft)"/><text x="108" y="734" font-size="24" font-weight="bold" fill="#be123c">問題所在</text><text x="108" y="770" font-size="20" fill="#5b6472">・複雜問題容易出錯</text><text x="108" y="798" font-size="20" fill="#5b6472">・無法追蹤推理步驟</text><text x="108" y="826" font-size="20" fill="#5b6472">・幻覺難以被察覺</text><rect x="980" y="230" width="760" height="52" rx="14" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-opacity="0.4"/><text x="1360" y="263" font-size="24" font-weight="bold" text-anchor="middle" fill="#0f766e">✓ Chain of Thought Prompting</text><rect x="1110" y="310" width="500" height="100" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1128,310 h464 a18,18 0 0 1 18,18 v6 h-500 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="1136" y="372" font-size="27" font-weight="bold" fill="#0369a1">問題</text><text x="1136" y="413" font-size="20" fill="#5b6472">輸入給模型</text><rect x="1110" y="440" width="500" height="100" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1128,440 h464 a18,18 0 0 1 18,18 v6 h-500 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="1136" y="502" font-size="27" font-weight="bold" fill="#4338ca">步驟 1：理解問題</text><text x="1136" y="543" font-size="20" fill="#5b6472">拆解已知條件</text><rect x="1110" y="570" width="500" height="100" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1128,570 h464 a18,18 0 0 1 18,18 v6 h-500 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="1136" y="632" font-size="27" font-weight="bold" fill="#4338ca">步驟 2：推導過程</text><text x="1136" y="673" font-size="20" fill="#5b6472">逐步計算 / 推理</text><rect x="1110" y="700" width="500" height="100" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1128,700 h464 a18,18 0 0 1 18,18 v6 h-500 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="1136" y="762" font-size="27" font-weight="bold" fill="#4338ca">步驟 3：驗證</text><text x="1136" y="803" font-size="20" fill="#5b6472">自我檢查結果</text><rect x="1110" y="830" width="500" height="100" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1128,830 h464 a18,18 0 0 1 18,18 v6 h-500 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="1136" y="892" font-size="27" font-weight="bold" fill="#0f766e">最終答案</text><text x="1136" y="933" font-size="20" fill="#5b6472">可追蹤、可審核</text><line x1="1360" y1="414" x2="1360" y2="433" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1360" y1="544" x2="1360" y2="563" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1360" y1="674" x2="1360" y2="693" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1360" y1="804" x2="1360" y2="823" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><rect x="1000" y="960" width="720" height="190" rx="16" fill="#f5f3ff" stroke="#e3dcff" filter="url(#soft)"/><text x="1028" y="1004" font-size="24" font-weight="bold" fill="#0f766e">CoT 的優勢</text><text x="1028" y="1040" font-size="20" fill="#5b6472">・準確率顯著提升（尤其推理/數學）</text><text x="1028" y="1068" font-size="20" fill="#5b6472">・推理過程可被審核與修正</text><text x="1028" y="1096" font-size="20" fill="#5b6472">・Zero-shot：加「讓我們一步步思考」</text><line x1="900" y1="230" x2="900" y2="1120" stroke="#8a93a6" stroke-width="1.5" stroke-dasharray="8 6"/></svg>