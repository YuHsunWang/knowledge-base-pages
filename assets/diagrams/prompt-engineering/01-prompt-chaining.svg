<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="840" viewBox="0 0 1800 840" font-family="Microsoft JhengHei, 微軟正黑體, Noto Sans CJK TC, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fbfcfe"/><stop offset="1" stop-color="#f3f5f9"/>
  </linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#27324a" flood-opacity="0.10"/>
  </filter>
  <marker id="aFaint" markerWidth="11" markerHeight="11" refX="7.5" refY="4" orient="auto">
    <path d="M0,0 L9,4 L0,8 Z" fill="#8a93a6"/>
  </marker>
  <marker id="aViolet" markerWidth="12" markerHeight="12" refX="8" refY="4.2" orient="auto">
    <path d="M0,0 L9.5,4.2 L0,8.4 Z" fill="#8b5cf6"/>
  </marker>
</defs>
<rect x="0" y="0" width="1800" height="840" fill="url(#bg)"/>
<rect x="1" y="1" width="1798" height="838" rx="22" fill="none" stroke="#e9ecf3"/>

<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#0369a1">PROMPT ENGINEERING</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">Prompt Chaining</text>
<text x="72" y="172" font-size="22" fill="#5b6472">將複雜任務拆解為多個有序步驟，每個 Prompt 職責單一，前一步輸出即為下一步輸入</text>
<rect x="36" y="270" width="298" height="330" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M54,270 h262 a18,18 0 0 1 18,18 v6 h-298 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="62" y="332" font-size="27" font-weight="bold" fill="#b45309">原始任務</text><text x="62" y="373" font-size="20" fill="#5b6472">複雜、多步驟</text><text x="62" y="406" font-size="20" fill="#5b6472">難以一次完成</text><rect x="390" y="270" width="298" height="330" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M408,270 h262 a18,18 0 0 1 18,18 v6 h-298 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="416" y="332" font-size="27" font-weight="bold" fill="#0369a1">Prompt 1</text><text x="416" y="373" font-size="20" fill="#5b6472">拆解與萃取</text><text x="416" y="406" font-size="20" fill="#5b6472">提取關鍵資訊</text><rect x="744" y="270" width="298" height="330" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M762,270 h262 a18,18 0 0 1 18,18 v6 h-298 v-6 a18,18 0 0 1 18,-18 z" fill="#6366f1"/><text x="770" y="332" font-size="27" font-weight="bold" fill="#4338ca">Prompt 2</text><text x="770" y="373" font-size="20" fill="#5b6472">分析與推理</text><text x="770" y="406" font-size="20" fill="#5b6472">深度處理</text><rect x="1098" y="270" width="298" height="330" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1116,270 h262 a18,18 0 0 1 18,18 v6 h-298 v-6 a18,18 0 0 1 18,-18 z" fill="#8b5cf6"/><text x="1124" y="332" font-size="27" font-weight="bold" fill="#6d28d9">Prompt 3</text><text x="1124" y="373" font-size="20" fill="#5b6472">整合生成</text><text x="1124" y="406" font-size="20" fill="#5b6472">組合成答案</text><rect x="1452" y="270" width="298" height="330" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1470,270 h262 a18,18 0 0 1 18,18 v6 h-298 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="1478" y="332" font-size="27" font-weight="bold" fill="#0f766e">最終結果</text><text x="1478" y="373" font-size="20" fill="#5b6472">精確、可審核</text><text x="1478" y="406" font-size="20" fill="#5b6472">品質穩定</text><line x1="338" y1="435" x2="383" y2="435" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="692" y1="435" x2="737" y2="435" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1046" y1="435" x2="1091" y2="435" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1400" y1="435" x2="1445" y2="435" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><text x="900" y="668" font-size="22" text-anchor="middle" fill="#5b6472">每個 Prompt 職責單一，前一步輸出即為下一步輸入</text><circle cx="68" cy="779" r="8" fill="#f59e0b"/><text x="86" y="785" font-size="21" fill="#5b6472">輸入任務</text><circle cx="256" cy="779" r="8" fill="#0ea5e9"/><text x="274" y="785" font-size="21" fill="#5b6472">拆解</text><circle cx="400" cy="779" r="8" fill="#6366f1"/><text x="418" y="785" font-size="21" fill="#5b6472">分析</text><circle cx="544" cy="779" r="8" fill="#8b5cf6"/><text x="562" y="785" font-size="21" fill="#5b6472">生成</text><circle cx="688" cy="779" r="8" fill="#14b8a6"/><text x="706" y="785" font-size="21" fill="#5b6472">最終結果</text></svg>