<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" font-family="Noto Sans CJK TC, Noto Sans CJK SC, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fbfcfe"/><stop offset="1" stop-color="#f3f5f9"/>
  </linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#27324a" flood-opacity="0.10"/>
  </filter>
  <marker id="aFaint" markerWidth="11" markerHeight="11" refX="7.5" refY="4" orient="auto">
    <path d="M0,0 L9,4 L0,8 Z" fill="#8a93a6"/>
  </marker>
  <marker id="aViolet" markerWidth="12" markerHeight="12" refX="8" refY="4.2" orient="auto">
    <path d="M0,0 L9.5,4.2 L0,8.4 Z" fill="#8b5cf6"/>
  </marker>
</defs>
<rect x="0" y="0" width="1800" height="1050" fill="url(#bg)"/>
<rect x="1" y="1" width="1798" height="1048" rx="22" fill="none" stroke="#e9ecf3"/>

<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#0369a1">BUSINESS CYCLE · 景氣循環</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">景氣循環四階段與操作</text>
<text x="72" y="172" font-size="22" fill="#5b6472">復甦 → 成長 → 榮景 → 衰退 → 周而復始;每個階段對應不同的進出策略</text>
<rect x="80" y="330" width="372" height="200" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,330 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="106" y="392" font-size="27" font-weight="bold" fill="#0f766e">復甦期 · 積極布局</text><text x="106" y="433" font-size="20" fill="#5b6472">失業率高點反轉</text><text x="106" y="466" font-size="20" fill="#5b6472">耐久財需求回升</text><rect x="502" y="330" width="372" height="200" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M520,330 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="528" y="392" font-size="27" font-weight="bold" fill="#0369a1">成長期 · 穩健持續</text><text x="528" y="433" font-size="20" fill="#5b6472">企業獲利穩定</text><text x="528" y="466" font-size="20" fill="#5b6472">就業持續增長</text><rect x="924" y="330" width="372" height="200" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M942,330 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="950" y="392" font-size="27" font-weight="bold" fill="#b45309">榮景期 · 彈性持股</text><text x="950" y="433" font-size="20" fill="#5b6472">透支性消費</text><text x="950" y="466" font-size="20" fill="#5b6472">固定投資衝頂</text><rect x="1346" y="330" width="372" height="200" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1364,330 h336 a18,18 0 0 1 18,18 v6 h-372 v-6 a18,18 0 0 1 18,-18 z" fill="#f43f5e"/><text x="1372" y="392" font-size="27" font-weight="bold" fill="#be123c">衰退期 · 轉守為攻</text><text x="1372" y="433" font-size="20" fill="#5b6472">數據全面轉弱</text><text x="1372" y="466" font-size="20" fill="#5b6472">持有債券 / 美元</text><line x1="458" y1="430.0" x2="494" y2="430.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="880" y1="430.0" x2="916" y2="430.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1302" y1="430.0" x2="1338" y2="430.0" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><path d="M1532.0,530 L1532.0,650 L266.0,650 L266.0,540" fill="none" stroke="#8b5cf6" stroke-width="2.6" stroke-dasharray="9 7" marker-end="url(#aViolet)"/><text x="899.0" y="684" font-size="22" font-weight="bold" text-anchor="middle" fill="#6d28d9">↻ 衰退期過後回到復甦期 · 景氣周而復始</text><circle cx="78" cy="984" r="8" fill="#14b8a6"/><text x="96" y="990" font-size="21" fill="#5b6472">復甦</text><circle cx="222" cy="984" r="8" fill="#0ea5e9"/><text x="240" y="990" font-size="21" fill="#5b6472">成長</text><circle cx="366" cy="984" r="8" fill="#f59e0b"/><text x="384" y="990" font-size="21" fill="#5b6472">榮景</text><circle cx="510" cy="984" r="8" fill="#f43f5e"/><text x="528" y="990" font-size="21" fill="#5b6472">衰退</text></svg>