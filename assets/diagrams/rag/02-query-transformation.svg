<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1020" viewBox="0 0 1800 1020" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fbfcfe"/><stop offset="1" stop-color="#f3f5f9"/>
  </linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#27324a" flood-opacity="0.10"/>
  </filter>
  <marker id="aFaint" markerWidth="11" markerHeight="11" refX="7.5" refY="4" orient="auto">
    <path d="M0,0 L9,4 L0,8 Z" fill="#8a93a6"/>
  </marker>
  <marker id="aViolet" markerWidth="12" markerHeight="12" refX="8" refY="4.2" orient="auto">
    <path d="M0,0 L9.5,4.2 L0,8.4 Z" fill="#8b5cf6"/>
  </marker>
</defs>
<rect x="0" y="0" width="1800" height="1020" fill="url(#bg)"/>
<rect x="1" y="1" width="1798" height="1018" rx="22" fill="none" stroke="#e9ecf3"/>

<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#6d28d9" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">TECHNIQUE · RAG</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">Query Transformation 查詢轉換策略</text>
<text x="72" y="172" font-size="22" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">將使用者原始問題轉換後再搜尋，提升檢索召回率與準確度</text>
<rect x="730" y="220" width="340" height="100" rx="18" fill="#8b5cf6" filter="url(#soft)"/><text x="900" y="262" font-size="26" font-weight="bold" text-anchor="middle" fill="white" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">使用者問題</text><text x="900" y="296" font-size="19" text-anchor="middle" fill="#e8d9ff" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">User Query</text><rect x="60" y="390" width="760" height="200" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M78,390 h724 a18,18 0 0 1 18,18 v10 h-760 v-10 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="86" y="450" font-size="26" font-weight="bold" fill="#0369a1" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">Multi-Query 多角度重寫</text><text x="86" y="482" font-size="20" font-style="italic" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">一問化多問，增加召回覆蓋率</text><text x="86" y="516" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">原始問題改寫成 3-5 個不同表述</text><text x="86" y="544" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">各自搜尋後去重合併</text><text x="86" y="572" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">適合問法模糊或表達不精確時</text><rect x="860" y="390" width="760" height="200" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M878,390 h724 a18,18 0 0 1 18,18 v10 h-760 v-10 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="886" y="450" font-size="26" font-weight="bold" fill="#0f766e" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">HyDE 假設文件嵌入</text><text x="886" y="482" font-size="20" font-style="italic" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">以假答案代替問題去搜尋</text><text x="886" y="516" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">讓 LLM 先生成一個「假設答案」</text><text x="886" y="544" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">用答案向量搜尋，非問題向量</text><text x="886" y="572" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">答案語意空間與文件更接近</text><rect x="60" y="622" width="760" height="200" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M78,622 h724 a18,18 0 0 1 18,18 v10 h-760 v-10 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="86" y="682" font-size="26" font-weight="bold" fill="#b45309" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">Step-Back Prompting</text><text x="86" y="714" font-size="20" font-style="italic" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">先問背景，再問細節</text><text x="86" y="748" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">把具體問題退一步成更廣泛的概念</text><text x="86" y="776" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">補充背景上下文後再答細節</text><text x="86" y="804" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">適合需要先驗知識的推理問題</text><rect x="860" y="622" width="760" height="200" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M878,622 h724 a18,18 0 0 1 18,18 v10 h-760 v-10 a18,18 0 0 1 18,-18 z" fill="#f43f5e"/><text x="886" y="682" font-size="26" font-weight="bold" fill="#be123c" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">Query Decomposition 拆解</text><text x="886" y="714" font-size="20" font-style="italic" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">複雜問題拆成子問題</text><text x="886" y="748" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">把多跳問題分解為獨立子問題</text><text x="886" y="776" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">各自搜尋並回答</text><text x="886" y="804" font-size="19" fill="#5b6472" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">合併子答案得到最終答案</text><path d="M900,320 L900,351 L440,351 L440,382" fill="none" stroke="#0ea5e9" stroke-width="2.4" stroke-dasharray="8 5" marker-end="url(#aFaint)"/><path d="M900,320 L900,351 L1240,351 L1240,382" fill="none" stroke="#14b8a6" stroke-width="2.4" stroke-dasharray="8 5" marker-end="url(#aFaint)"/><path d="M900,320 L900,467 L440,467 L440,614" fill="none" stroke="#f59e0b" stroke-width="2.4" stroke-dasharray="8 5" marker-end="url(#aFaint)"/><path d="M900,320 L900,467 L1240,467 L1240,614" fill="none" stroke="#f43f5e" stroke-width="2.4" stroke-dasharray="8 5" marker-end="url(#aFaint)"/><circle cx="78" cy="959" r="8" fill="#0ea5e9"/><text x="96" y="965" font-size="21" fill="#5b6472">Multi-Query</text><circle cx="420" cy="959" r="8" fill="#14b8a6"/><text x="438" y="965" font-size="21" fill="#5b6472">HyDE</text><circle cx="608" cy="959" r="8" fill="#f59e0b"/><text x="626" y="965" font-size="21" fill="#5b6472">Step-Back</text><circle cx="906" cy="959" r="8" fill="#f43f5e"/><text x="924" y="965" font-size="21" fill="#5b6472">Decomposition</text></svg>