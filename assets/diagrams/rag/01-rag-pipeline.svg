<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1020" viewBox="0 0 1800 1020" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#fbfcfe"/><stop offset="1" stop-color="#f3f5f9"/>
  </linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#27324a" flood-opacity="0.10"/>
  </filter>
  <marker id="aFaint" markerWidth="11" markerHeight="11" refX="7.5" refY="4" orient="auto">
    <path d="M0,0 L9,4 L0,8 Z" fill="#8a93a6"/>
  </marker>
  <marker id="aViolet" markerWidth="12" markerHeight="12" refX="8" refY="4.2" orient="auto">
    <path d="M0,0 L9.5,4.2 L0,8.4 Z" fill="#8b5cf6"/>
  </marker>
</defs>
<rect x="0" y="0" width="1800" height="1020" fill="url(#bg)"/>
<rect x="1" y="1" width="1798" height="1018" rx="22" fill="none" stroke="#e9ecf3"/>

<text x="72" y="78" font-size="22" font-weight="bold" letter-spacing="3" fill="#0369a1">ARCHITECTURE · RAG</text>
<text x="70" y="132" font-size="46" font-weight="bold" fill="#1f2430">RAG 三階段架構</text>
<text x="72" y="172" font-size="22" fill="#5b6472">離線索引（Indexing）→ 線上檢索（Retrieval）→ 生成回答（Generation）</text>
<rect x="80" y="224" width="180" height="38" rx="10" fill="#0369a1" opacity="0.15"/><text x="90" y="252" font-size="22" font-weight="bold" fill="#0369a1" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">【離線索引】</text><rect x="80" y="290" width="330" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,290 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="106" y="352" font-size="27" font-weight="bold" fill="#0369a1">原始文件</text><text x="106" y="393" font-size="20" fill="#5b6472">PDF、Word、網頁、資料庫</text><text x="106" y="426" font-size="20" fill="#5b6472">任意格式皆可</text><rect x="438" y="290" width="330" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M456,290 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="464" y="352" font-size="27" font-weight="bold" fill="#0369a1">文件分塊</text><text x="464" y="393" font-size="20" fill="#5b6472">Recursive / Semantic</text><text x="464" y="426" font-size="20" fill="#5b6472">chunk_size=512, overlap=50</text><rect x="796" y="290" width="330" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M814,290 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#0ea5e9"/><text x="822" y="352" font-size="27" font-weight="bold" fill="#0369a1">向量化</text><text x="822" y="393" font-size="20" fill="#5b6472">Embedding Model 轉換</text><text x="822" y="426" font-size="20" fill="#5b6472">語意接近→向量相近</text><rect x="1154" y="290" width="330" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1172,290 h294 a18,18 0 0 1 18,18 v6 h-330 v-6 a18,18 0 0 1 18,-18 z" fill="#14b8a6"/><text x="1180" y="352" font-size="27" font-weight="bold" fill="#0f766e">向量資料庫</text><text x="1180" y="393" font-size="20" fill="#5b6472">Chroma / Qdrant / FAISS</text><text x="1180" y="426" font-size="20" fill="#5b6472">ANN 相似度索引</text><line x1="414" y1="377" x2="432" y2="377" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="772" y1="377" x2="790" y2="377" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1130" y1="377" x2="1148" y2="377" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><rect x="80" y="584" width="180" height="38" rx="10" fill="#be123c" opacity="0.15"/><text x="90" y="612" font-size="22" font-weight="bold" fill="#be123c" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">【線上查詢】</text><rect x="80" y="650" width="280" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M98,650 h244 a18,18 0 0 1 18,18 v6 h-280 v-6 a18,18 0 0 1 18,-18 z" fill="#f43f5e"/><text x="106" y="712" font-size="27" font-weight="bold" fill="#be123c">使用者問題</text><text x="106" y="753" font-size="20" fill="#5b6472">自然語言提問</text><text x="106" y="786" font-size="20" fill="#5b6472">模糊或精確皆可</text><rect x="388" y="650" width="280" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M406,650 h244 a18,18 0 0 1 18,18 v6 h-280 v-6 a18,18 0 0 1 18,-18 z" fill="#f43f5e"/><text x="414" y="712" font-size="27" font-weight="bold" fill="#be123c">問題向量化</text><text x="414" y="753" font-size="20" fill="#5b6472">同一 Embedding Model</text><text x="414" y="786" font-size="20" fill="#5b6472">對齊索引空間</text><rect x="696" y="650" width="280" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M714,650 h244 a18,18 0 0 1 18,18 v6 h-280 v-6 a18,18 0 0 1 18,-18 z" fill="#f43f5e"/><text x="722" y="712" font-size="27" font-weight="bold" fill="#be123c">相似度搜尋</text><text x="722" y="753" font-size="20" fill="#5b6472">ANN 查詢向量資料庫</text><text x="722" y="786" font-size="20" fill="#5b6472">取回最相關文件</text><rect x="1004" y="650" width="280" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1022,650 h244 a18,18 0 0 1 18,18 v6 h-280 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1030" y="712" font-size="27" font-weight="bold" fill="#b45309">Top-K 文件</text><text x="1030" y="753" font-size="20" fill="#5b6472">K=5~20 候選文件</text><text x="1030" y="786" font-size="20" fill="#5b6472">可加 Re-ranking</text><rect x="1312" y="650" width="280" height="175" rx="18" fill="#ffffff" stroke="#e6e8ef" filter="url(#soft)"/><path d="M1330,650 h244 a18,18 0 0 1 18,18 v6 h-280 v-6 a18,18 0 0 1 18,-18 z" fill="#f59e0b"/><text x="1338" y="712" font-size="27" font-weight="bold" fill="#b45309">Prompt + 生成</text><text x="1338" y="753" font-size="20" fill="#5b6472">組合提示詞 + 文件</text><text x="1338" y="786" font-size="20" fill="#5b6472">LLM 生成最終答案</text><line x1="364" y1="737" x2="382" y2="737" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="672" y1="737" x2="690" y2="737" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="980" y1="737" x2="998" y2="737" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><line x1="1288" y1="737" x2="1306" y2="737" stroke="#8a93a6" stroke-width="2.4" marker-end="url(#aFaint)"/><path d="M1319,471 L1319,556 L836,556 L836,642" fill="none" stroke="#14b8a6" stroke-width="2.8" stroke-dasharray="10 6" marker-end="url(#aFaint)"/><text x="1087" y="546" font-size="20" font-weight="bold" fill="#0f766e" font-family="Microsoft JhengHei, 微軟正黑體, sans-serif">向量索引查詢</text><circle cx="78" cy="959" r="8" fill="#0ea5e9"/><text x="96" y="965" font-size="21" fill="#5b6472">索引處理</text><circle cx="266" cy="959" r="8" fill="#14b8a6"/><text x="284" y="965" font-size="21" fill="#5b6472">向量資料庫</text><circle cx="476" cy="959" r="8" fill="#f43f5e"/><text x="494" y="965" font-size="21" fill="#5b6472">問題處理</text><circle cx="664" cy="959" r="8" fill="#f59e0b"/><text x="682" y="965" font-size="21" fill="#5b6472">生成回答</text></svg>